name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "GBIF_Downloader_v2" --clean gbif_nebria_downloader_v2.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GBIF_Downloader_v2_Windows
          path: dist/GBIF_Downloader_v2.exe
          retention-days: 90
